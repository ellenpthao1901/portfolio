<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Unique selling points — granular inputs for personalization and customization features">
  <defs>
    <linearGradient id="pods-usp-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cfe1ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#b9cffb" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="pods-usp-lilac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dccaef" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#c5b0ec" stop-opacity="0.85" />
    </linearGradient>
    <radialGradient id="pods-usp-circle-pink" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#f6dff2" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#e6c8ee" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#cfb4ec" stop-opacity="0.85" />
    </radialGradient>
    <radialGradient id="pods-usp-circle-lilac" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ecd9f8" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#d8c2f0" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#bea5e8" stop-opacity="0.85" />
    </radialGradient>
  </defs>

  <!-- Pale blue ribbon top arc -->
  <path d="M 110 280
           C 220 110, 460 110, 540 240
           C 600 340, 480 380, 410 320"
        fill="none"
        stroke="url(#pods-usp-blue)"
        stroke-width="62"
        stroke-linecap="round" />

  <!-- Lilac ribbon bottom arc -->
  <path d="M 540 290
           C 620 220, 720 230, 800 350
           C 880 470, 1020 470, 1100 360"
        fill="none"
        stroke="url(#pods-usp-lilac)"
        stroke-width="62"
        stroke-linecap="round" />

  <!-- Star circle -->
  <circle cx="430" cy="410" r="135" fill="url(#pods-usp-circle-pink)" />
  <path d="M 430 340
           L 449 388
           L 500 392
           L 460 425
           L 472 477
           L 430 448
           L 388 477
           L 400 425
           L 360 392
           L 411 388 Z"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linejoin="round" />

  <!-- Pause circle -->
  <circle cx="900" cy="220" r="135" fill="url(#pods-usp-circle-lilac)" />
  <!-- corner dots -->
  <circle cx="855" cy="172" r="5" fill="#ffffff" />
  <circle cx="945" cy="172" r="5" fill="#ffffff" />
  <circle cx="855" cy="268" r="5" fill="#ffffff" />
  <circle cx="945" cy="268" r="5" fill="#ffffff" />
  <!-- pause bars -->
  <rect x="877" y="186" width="14" height="68" rx="4" fill="#ffffff" />
  <rect x="909" y="186" width="14" height="68" rx="4" fill="#ffffff" />
</svg>
